# Example configuration for general_unlearning_audit.py
#
# Run:
#   python experiments/audit/general_unlearning_audit.py --config configs/audit/example_general_audit.yaml
#
# CLI flags override individual fields after the YAML is loaded.

base_model_path: "/path/to/base"
candidate_model_path: "/path/to/candidate"
snmf_dir: "/path/to/snmf_outputs"
data_path: "/path/to/prompts.json"
output_dir: "/path/to/audit_output"

layers: "10-18"
# layers: [10, 11, 12]

runtime:
  max_prompts: 400
  batch_size: 8
  device: auto
  seed: 42

snmf:
  mode: mlp_intermediate
  ridge_lambda: 1.0e-4
  top_k_global: 20
  top_k_per_layer: 15
  rank_by: rel_delta
  contexts_per_feature: 8
  context_window: 15

lens:
  vocab_lens_top_k: 15
  skip_vocab_lens: false
  lens_center_unembed: true
  lens_mask_special_tokens: true
  vocab_lens_aggregate_top_k: 20
  lens_delta_weighted: true

rare:
  context_rare_top_n: 15
  skip_context_rare_words: false
  context_rare_zipf_cutoff: 5.5
  context_rare_min_len: 3

judge:
  judge_model: gemini-2.5-flash
  judge_temperature: 0.0
  judge_max_output_tokens: 8192
  skip_judge: false
  judge_api_key_env: GOOGLE_API_KEY
